AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: 5letter.sankey.tech — Wordle Solver backend

Globals:
  Function:
    Runtime: python3.12
    # 1769 MB = one full vCPU; the entropy ranking is CPU-bound
    MemorySize: 1769
    Timeout: 28

Resources:

  SolverFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: five-letter-solver
      CodeUri: backend/
      Handler: handler.lambda_handler
      # Hard cap on parallel executions — bounds worst-case Lambda spend on
      # this public, CPU-heavy endpoint
      ReservedConcurrentExecutions: 10
      Events:
        ApiPost:
          Type: HttpApi
          Properties:
            Path: /api/solve
            Method: POST
            ApiId: !Ref HttpApi

  AiSuggestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: five-letter-ai-suggest
      CodeUri: backend/
      Handler: ai_handler.lambda_handler
      # Lower cap than the solver — each invocation also spends Claude tokens
      ReservedConcurrentExecutions: 5
      # Re-runs the CPU-bound entropy ranking before calling Claude, so it
      # needs the same full vCPU as the solver (inherited from Globals)
      Environment:
        Variables:
          CLAUDE_API_KEY_PARAM: claude
          # The API key parameter lives in us-west-1; the stack deploys to us-east-1
          CLAUDE_PARAM_REGION: us-west-1
      Policies:
        - Statement:
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub arn:aws:ssm:us-west-1:${AWS::AccountId}:parameter/claude
      Events:
        ApiPost:
          Type: HttpApi
          Properties:
            Path: /api/ai-suggest
            Method: POST
            ApiId: !Ref HttpApi

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      # Reject floods at the gateway before they invoke (and bill) a Lambda
      DefaultRouteSettings:
        ThrottlingRateLimit: 5
        ThrottlingBurstLimit: 10
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

Outputs:
  ApiUrl:
    Description: Paste this URL as the API Gateway origin in CloudFront
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
